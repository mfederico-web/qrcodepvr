<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator DAZNBET</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      padding: 24px;
      gap: 24px;
    }
    
    .sidebar {
      width: 420px;
      padding: 32px;
      background: #161616;
      border-radius: 20px;
      border: 1px solid #222;
      height: fit-content;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
    }
    
    .logo-header {
      text-align: center;
      margin-bottom: 8px;
    }
    
    .logo-header img {
      height: 48px;
    }
    
    .tool-title {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      font-weight: 500;
    }
    
    .section-divider {
      height: 1px;
      background: #333;
      margin: 28px 0;
    }
    
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section-title::before {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }
    
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }
    
    .field {
      margin-bottom: 18px;
    }
    
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #f7ff1a;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    
    .input {
      width: 100%;
      background: #0a0a0a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .input:focus {
      outline: none;
      border-color: #f7ff1a;
      box-shadow: 0 0 0 3px rgba(247, 255, 26, 0.1);
    }
    
    .input::placeholder {
      color: #444;
      font-weight: 400;
    }
    
    .input.code-input {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
    }
    
    .url-preview {
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
    }
    
    .url-preview code {
      font-size: 10px;
      color: #666;
      word-break: break-all;
    }
    
    .url-preview .highlight {
      color: #f7ff1a;
      font-weight: 600;
    }
    
    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-primary {
      background: #f7ff1a;
      color: #000;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(247, 255, 26, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-primary.success {
      background: #10b981;
      color: #fff;
    }
    
    .btn-secondary {
      background: transparent;
      color: #888;
      margin-top: 10px;
      border: 2px solid #333;
    }
    
    .btn-secondary:hover:not(:disabled) {
      color: #f7ff1a;
      border-color: #f7ff1a;
    }
    
    .btn-secondary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .btn-email {
      background: #2563eb;
      color: #fff;
      margin-top: 10px;
    }
    
    .btn-email:hover:not(:disabled) {
      background: #1d4ed8;
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
    }
    
    .btn-email:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .btn-email.success {
      background: #10b981;
    }
    
    .btn.hidden {
      display: none;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .status.visible {
      opacity: 1;
    }
    
    .status.success {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }
    
    .status.loading {
      background: rgba(247, 255, 26, 0.05);
      color: #f7ff1a;
    }
    
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    
    .tool-signature {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #444;
      font-style: italic;
    }
    
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .preview-label {
      font-size: 11px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    
    .preview-container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 40px 30px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 320px;
    }
    
    .preview-logo {
      height: 40px;
      margin-bottom: 30px;
    }
    
    .preview-qr {
      width: 180px;
      height: 180px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 12px;
      margin-bottom: 16px;
    }
    
    .preview-qr canvas,
    .preview-qr img {
      width: 100% !important;
      height: 100% !important;
    }
    
    .preview-scan {
      font-size: 11px;
      font-weight: 700;
      color: #333;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }
    
    .preview-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      width: 100%;
      justify-content: center;
    }
    
    .preview-footer img {
      height: 24px;
    }
    
    .preview-footer span {
      font-size: 9px;
      color: #666;
      font-weight: 600;
    }
    
    #qr-generator {
      position: absolute;
      left: -9999px;
    }
    
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo-header">
      <img id="sidebar-logo" alt="DAZNBET">
    </div>
    <p class="tool-title">QR Code Generator • Registrazione Punto</p>
    
    <!-- SEZIONE QR CODE -->
    <div class="section-title">Genera QR Code</div>
    
    <div class="field">
      <label>Codice Punto</label>
      <input 
        type="text" 
        class="input code-input" 
        id="codice-punto" 
        placeholder="Inserisci il codice"
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    
    <div class="url-preview">
      <code>https://www.daznbet.it/signup?codAffiliato=<span class="highlight" id="url-code">*******</span></code>
    </div>
    
    <button class="btn btn-primary" id="btn-generate" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      Genera QR Code
    </button>
    
    <button class="btn btn-secondary hidden" id="btn-download">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Scarica PDF A4
    </button>
    
    <div class="status" id="status-qr"></div>
    
    <!-- SEZIONE EMAIL -->
    <div class="section-divider"></div>
    <div class="section-title">Invia Email</div>
    
    <div class="field">
      <label>Email Destinatario</label>
      <input 
        type="email" 
        class="input" 
        id="email-destinatario" 
        placeholder="esempio@email.com"
        autocomplete="off"
      >
    </div>
    
    <div class="field">
      <label>User</label>
      <input 
        type="text" 
        class="input" 
        id="email-user" 
        placeholder="Username operatore"
        autocomplete="off"
      >
    </div>
    
    <div class="field">
      <label>Password</label>
      <input 
        type="text" 
        class="input" 
        id="email-password" 
        placeholder="Password operatore"
        autocomplete="off"
      >
    </div>
    
    <div class="field">
      <label>Referral QR</label>
      <input 
        type="text" 
        class="input" 
        id="email-referral" 
        placeholder="Compilato automaticamente"
        readonly
        style="background: #111; color: #888;"
      >
    </div>
    
    <button class="btn btn-email" id="btn-send-email" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>
      Invia Email con PDF
    </button>
    
    <div class="status" id="status-email"></div>
    
    <div class="tool-signature">By Massimino Federico</div>
  </div>
  
  <div class="preview-area">
    <div class="preview-label">Anteprima PDF</div>
    <div class="preview-container">
      <img class="preview-logo" id="preview-logo" alt="DAZNBET">
      <div class="preview-qr" id="preview-qr">QR Code</div>
      <div class="preview-scan">SCANSIONAMI</div>
      <div class="preview-footer">
        <img id="footer-18" alt="18+">
        <span>CONCESSIONE ADM 16041</span>
        <img id="footer-adm" alt="ADM">
      </div>
    </div>
  </div>
  
  <div id="qr-generator"></div>

const previewQR = document.getElementById('preview-qr');
const qrContainer = document.getElementById('qr-generator');

// Email fields
const inputEmailTo = document.getElementById('email-destinatario');
const inputEmailUser = document.getElementById('email-user');
const inputEmailPassword = document.getElementById('email-password');
const inputEmailReferral = document.getElementById('email-referral');

// ============================================================
// INIT LOGOS
// ============================================================
function initLogos() {
  document.getElementById('sidebar-logo').src = 'data:image/png;base64,' + LOGO_DAZNBET;
  document.getElementById('preview-logo').src = 'data:image/png;base64,' + LOGO_DAZNBET;
  document.getElementById('footer-18').src = 'data:image/png;base64,' + LOGO_18;
  document.getElementById('footer-adm').src = 'data:image/svg+xml;base64,' + LOGO_ADM;
}

// ============================================================
// QR CODE GENERATION
// ============================================================
function generateQR(code) {
  return new Promise((resolve) => {
    qrContainer.innerHTML = '';
    
    const url = CONFIG.baseUrl + encodeURIComponent(code);
    
    new QRCode(qrContainer, {
      text: url,
      width: 2000,
      height: 2000,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    
    setTimeout(() => {
      const canvas = qrContainer.querySelector('canvas');
      if (canvas) {
        resolve(canvas.toDataURL('image/png'));
      } else {
        resolve(null);
      }
    }, 300);
  });
}

// ============================================================
// SVG TO PNG CONVERSION
// ============================================================
function svgToPng(svgBase64, width, height) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = 'data:image/svg+xml;base64,' + svgBase64;
  });
}

// ============================================================
// PDF GENERATION
// ============================================================
async function generatePDF(code, qrData, returnBase64 = false) {
  const { jsPDF } = window.jspdf;
  
  const pageWidth = 210;
  const pageHeight = 297;
  
  const pdf = new jsPDF({
    orientation: 'portrait',
    unit: 'mm',
    format: 'a4'
  });
  
  // White background
  pdf.setFillColor(255, 255, 255);
  pdf.rect(0, 0, pageWidth, pageHeight, 'F');
  
  // Add DAZNBET logo at top center
  const logoData = 'data:image/png;base64,' + LOGO_DAZNBET;
  const logoHeight = 20;
  const logoWidth = logoHeight * 2.5;
  const logoX = (pageWidth - logoWidth) / 2;
  const logoY = 35;
  pdf.addImage(logoData, 'PNG', logoX, logoY, logoWidth, logoHeight);
  
  // Add QR code centered
  if (qrData) {
    const qrSize = 100;
    const qrX = (pageWidth - qrSize) / 2;
    const qrY = 75;
    pdf.addImage(qrData, 'PNG', qrX, qrY, qrSize, qrSize);
  }
  
  // Add "SCANSIONAMI" text
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(14);
  pdf.setTextColor(50, 50, 50);
  const scanText = 'SCANSIONAMI';
  const scanWidth = pdf.getTextWidth(scanText);
  pdf.text(scanText, (pageWidth - scanWidth) / 2, 190);
  
  // Footer section
  const footerY = 250;
  
  // Add 18+ logo
  const logo18Data = 'data:image/png;base64,' + LOGO_18;
  const logo18Size = 12;
  pdf.addImage(logo18Data, 'PNG', 65, footerY, logo18Size, logo18Size);
  
  // Add "CONCESSIONE ADM 16041" text
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(10);
  pdf.setTextColor(80, 80, 80);
  const concText = 'CONCESSIONE ADM 16041';
  const concWidth = pdf.getTextWidth(concText);
  pdf.text(concText, (pageWidth - concWidth) / 2, footerY + 8);
  
  // Add ADM logo
  const admPngData = await svgToPng(LOGO_ADM, 400, 200);
  if (admPngData) {
    const admHeight = 12;
    const admWidth = admHeight * 2;
    pdf.addImage(admPngData, 'PNG', 130, footerY, admWidth, admHeight);
  }
  
  if (returnBase64) {
    return pdf.output('datauristring').split(',')[1];
  } else {
    pdf.save(`QR_DAZNBET_${code}.pdf`);
    return null;
  }
}

// ============================================================
// SEND EMAIL
// ============================================================
async function sendEmail() {
  const to = inputEmailTo.value.trim();
  const user = inputEmailUser.value.trim();
  const password = inputEmailPassword.value.trim();
  const referralQR = inputEmailReferral.value.trim();
  
  if (!to || !user || !password || !referralQR) {
    showStatus(statusEmail, 'Compila tutti i campi', 'error');
    return;
  }
  
  showStatus(statusEmail, 'Generazione PDF e invio email...', 'loading');
  
  try {
    // Generate PDF as base64
    const pdfBase64 = await generatePDF(currentCode, currentQRData, true);
    
    const response = await fetch(CONFIG.apiEndpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        to,
        user,
        password,
        referralQR,
        pdfBase64,
        pdfFilename: `QR_DAZNBET_${currentCode}.pdf`
      }),
    });
    
    // Check if response is ok
    const responseText = await response.text();
    console.log('Response status:', response.status);
    console.log('Response text:', responseText);
    
    let result;
    try {
      result = JSON.parse(responseText);
    } catch (e) {
      throw new Error(`Risposta server non valida: ${responseText.substring(0, 100)}`);
    }
    
    if (response.ok && result.success) {
      showStatus(statusEmail, `Email inviata con successo a ${to}`, 'success');
      btnSendEmail.classList.add('success');
      btnSendEmail.innerHTML = '✓ Email Inviata';
      
      setTimeout(() => {
        btnSendEmail.classList.remove('success');
        btnSendEmail.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
          </svg>
          Invia Email con PDF
        `;
      }, 3000);
    } else {
      throw new Error(result.error || 'Errore sconosciuto');
    }
  } catch (error) {
    console.error('Email error:', error);
    showStatus(statusEmail, `Errore: ${error.message}`, 'error');
  }
}

// ============================================================
// UI FUNCTIONS
// ============================================================
function showStatus(element, message, type = 'success') {
  element.textContent = message;
  element.className = `status visible ${type}`;
  
  if (type === 'success') {
    setTimeout(() => element.classList.remove('visible'), 4000);
  }
}

function updatePreview(qrData) {
  if (qrData) {
    previewQR.innerHTML = `<img src="${qrData}" alt="QR Code">`;
  } else {
    previewQR.innerHTML = 'QR Code';
  }
}

function validateEmailForm() {
  const hasQR = currentQRData !== null;
  const hasTo = inputEmailTo.value.trim() !== '';
  const hasUser = inputEmailUser.value.trim() !== '';
  const hasPassword = inputEmailPassword.value.trim() !== '';
  
  btnSendEmail.disabled = !(hasQR && hasTo && hasUser && hasPassword);
}

function resetUI() {
  btnGenerate.classList.remove('success');
  btnGenerate.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
    </svg>
    Genera QR Code
  `;
  btnDownload.classList.add('hidden');
  currentQRData = null;
  inputEmailReferral.value = '';
  updatePreview(null);
  validateEmailForm();
}

// ============================================================
// EVENT HANDLERS
// ============================================================
inputCode.addEventListener('input', (e) => {
  const value = e.target.value.toUpperCase().trim();
  e.target.value = value;
  
  urlCodeSpan.textContent = value || '*******';
  btnGenerate.disabled = !value;
  
  if (value !== currentCode) {
    resetUI();
  }
});

inputCode.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !btnGenerate.disabled) {
    btnGenerate.click();
  }
});

btnGenerate.addEventListener('click', async () => {
  const code = inputCode.value.trim();
  if (!code) return;
  
  currentCode = code;
  showStatus(statusQR, 'Generazione QR Code...', 'loading');
  
  currentQRData = await generateQR(code);
  
  if (currentQRData) {
    updatePreview(currentQRData);
    
    btnGenerate.classList.add('success');
    btnGenerate.innerHTML = '✓ QR Code Generato';
    btnDownload.classList.remove('hidden');
    
    // Update referral field
    inputEmailReferral.value = code;
    
    showStatus(statusQR, `QR Code pronto per: ${code}`, 'success');
    validateEmailForm();
  }
});

btnDownload.addEventListener('click', async () => {
  if (!currentQRData || !currentCode) return;
  
  showStatus(statusQR, 'Generazione PDF...', 'loading');
  
  await generatePDF(currentCode, currentQRData);
  showStatus(statusQR, `PDF scaricato: QR_DAZNBET_${currentCode}.pdf`, 'success');
});

btnSendEmail.addEventListener('click', sendEmail);

// Email form validation
inputEmailTo.addEventListener('input', validateEmailForm);
inputEmailUser.addEventListener('input', validateEmailForm);
inputEmailPassword.addEventListener('input', validateEmailForm);

// ============================================================
// INIT
// ============================================================
initLogos();
</script>
